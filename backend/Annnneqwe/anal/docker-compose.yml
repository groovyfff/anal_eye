version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password

  external-markets-service:
    build: .
    env_file: .env
    depends_on:
      - rabbitmq
    volumes:
      - ./config:/app/config
      - ./src:/app/src
