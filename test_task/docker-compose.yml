# =============================================================================
# A.E. Brain local infrastructure
#
#   docker compose --profile app up -d --build
#   docker compose --profile local-mq up -d   # optional local RabbitMQ only
#
# AE Brain joins the main AnalEyes Docker network (analeyes_analeyes-net) so
# hostname `rabbitmq` resolves to the backend broker. Local Postgres is reached
# via the unique alias `aeb-postgres` on aeb-internal (avoids collision with
# backend `postgres`). Set RABBITMQ_APP_PASSWORD to match backend .env.
# =============================================================================

networks:
  aeb-internal:
    driver: bridge
  backend_analeyes_net:
    external: true
    name: analeyes_analeyes-net

services:
  postgres:
    image: postgres:16
    container_name: aeb-postgres
    profiles: ["app"]
    networks:
      aeb-internal:
        aliases:
          - aeb-postgres
    environment:
      POSTGRES_USER: ${AEB_DB_USER:-ae_brain}
      POSTGRES_PASSWORD: ${AEB_DB_PASSWORD:-ae_brain}
      POSTGRES_DB: ${AEB_DB_NAME:-ae_brain}
    ports:
      - "${AEB_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./ae_brain/data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AEB_DB_USER:-ae_brain} -d ${AEB_DB_NAME:-ae_brain}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    profiles: ["local-mq"]
    image: rabbitmq:3.13-management
    container_name: aeb-rabbitmq
    networks:
      - aeb-internal
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_ADMIN_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_ADMIN_PASSWORD:-changeme}
    ports:
      - "${AEB_AMQP_PORT:-5672}:5672"
      - "${AEB_AMQP_UI_PORT:-15672}:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq-bootstrap:
    profiles: ["local-mq"]
    image: curlimages/curl:8.5.0
    container_name: aeb-rabbitmq-bootstrap
    networks:
      - aeb-internal
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_ADMIN_USER: ${RABBITMQ_ADMIN_USER:-admin}
      RABBITMQ_ADMIN_PASSWORD: ${RABBITMQ_ADMIN_PASSWORD:-changeme}
      RABBITMQ_APP_USER: ${RABBITMQ_APP_USER:-analeyes}
      RABBITMQ_APP_PASSWORD: ${RABBITMQ_APP_PASSWORD:-changeme}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-analeyes}
    volumes:
      - ./infra/rabbitmq/bootstrap.sh:/bootstrap.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    restart: "no"

  ae-brain:
    build:
      context: .
      dockerfile: Dockerfile
    image: ae-brain:latest
    container_name: aeb-app
    profiles: ["app"]
    networks:
      - aeb-internal
      - backend_analeyes_net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AEB_ENV: ${AEB_ENV:-dev}
      AEB_LOG_JSON: "true"
      AEB_DB_HOST: ${AEB_DB_HOST:-aeb-postgres}
      AEB_DB_PORT: "5432"
      AEB_DB_USER: ${AEB_DB_USER:-ae_brain}
      AEB_DB_PASSWORD: ${AEB_DB_PASSWORD:-ae_brain}
      AEB_DB_NAME: ${AEB_DB_NAME:-ae_brain}
      AEB_AMQP_HOST: ${AEB_AMQP_HOST:-rabbitmq}
      AEB_AMQP_PORT: "5672"
      AEB_INPUT_AMQP_URL: ${AEB_INPUT_AMQP_URL:-amqp://analeyes:${RABBITMQ_APP_PASSWORD:-analeyes_dev_secret}@rabbitmq:5672/analeyes}
      AEB_INPUT_EXCHANGE: ${AEB_INPUT_EXCHANGE:-analeyes.events}
      AEB_INPUT_QUEUE: ${AEB_INPUT_QUEUE:-q_data_candidates_ai}
      AEB_INPUT_ROUTING_KEY: ${AEB_INPUT_ROUTING_KEY:-data.candidates.ai}
      AEB_OUTPUT_AMQP_URL: ${AEB_OUTPUT_AMQP_URL:-amqp://analeyes:${RABBITMQ_APP_PASSWORD:-analeyes_dev_secret}@rabbitmq:5672/analeyes}
      AEB_OUTPUT_EXCHANGE: ${AEB_OUTPUT_EXCHANGE:-analeyes.events}
      AEB_OUTPUT_ROUTING_KEY: ${AEB_OUTPUT_ROUTING_KEY:-signal.final}
      AEB_ALLOW_LEGACY_GUEST_VHOST: ${AEB_ALLOW_LEGACY_GUEST_VHOST:-false}
      AEB_DIRECT_TELEGRAM_ENABLED: ${AEB_DIRECT_TELEGRAM_ENABLED:-false}
      AEB_GPU_ENABLED: "true"
      AEB_GPU_USE_FP16: "true"
      AEB_GPU_PREFER_ONNX: "true"
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      AEB_WAIT_FOR_DEPS: "true"
      AEB_AUTO_INIT_DB: "true"
      AEB_MIN_PUBLISH_CONFIDENCE: "${AEB_MIN_PUBLISH_CONFIDENCE:-0.70}"
      AEB_ALLOWED_SYMBOLS: "${AEB_ALLOWED_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,DOGEUSDT}"
      AEB_ONLY_BTC: "${AEB_ONLY_BTC:-false}"
      AEB_PUBLISH_SKIPPED_DECISIONS: ${AEB_PUBLISH_SKIPPED_DECISIONS:-false}
      AEB_DISABLE_SIGNAL_DEDUP_IN_TEST_MODE: ${AEB_DISABLE_SIGNAL_DEDUP_IN_TEST_MODE:-false}
      # Optional news.market_signal fusion (OpenRouter path). Bounded, fail-closed:
      # a no-op when the queue is empty / broker is down. Never breaks inference.
      AEB_NEWS_SIGNAL_ENABLED: ${AEB_NEWS_SIGNAL_ENABLED:-true}
      AEB_NEWS_SIGNAL_EXCHANGE: ${AEB_NEWS_SIGNAL_EXCHANGE:-analeyes.events}
      AEB_NEWS_SIGNAL_QUEUE: ${AEB_NEWS_SIGNAL_QUEUE:-q_news_market_signal}
      AEB_NEWS_SIGNAL_ROUTING_KEY: ${AEB_NEWS_SIGNAL_ROUTING_KEY:-news.market_signal}
      AEB_NEWS_SIGNAL_TTL_SEC: ${AEB_NEWS_SIGNAL_TTL_SEC:-21600}
      AEB_NEWS_MAX_CONF_DELTA: ${AEB_NEWS_MAX_CONF_DELTA:-0.05}
      AEB_NEWS_MAX_EV_MULTIPLIER_DELTA: ${AEB_NEWS_MAX_EV_MULTIPLIER_DELTA:-0.10}
      AEB_NEWS_MIN_RELEVANCE: ${AEB_NEWS_MIN_RELEVANCE:-0.65}
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    command: ["run"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    restart: unless-stopped

volumes:
  pgdata:
  rabbitmqdata:
